<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EduTrack – College Attendance Management</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --sidebar-w: 240px;
    --topbar-h: 60px;
    --primary: #4f46e5;
    --primary-light: #eef2ff;
    --primary-dark: #3730a3;
    --accent: #06b6d4;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --bg: #f8fafc;
    --surface: #ffffff;
    --surface2: #f1f5f9;
    --text: #0f172a;
    --text2: #475569;
    --text3: #94a3b8;
    --border: #e2e8f0;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
    --shadow-md: 0 4px 24px rgba(79,70,229,.12);
    --radius: 12px;
    --radius-sm: 8px;
    --transition: .2s cubic-bezier(.4,0,.2,1);
  }
  [data-theme="dark"] {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #263146;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --text3: #475569;
    --border: #334155;
    --primary-light: #1e1b4b;
    --shadow: 0 1px 3px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); transition: background var(--transition), color var(--transition); min-height: 100vh; }
  /* LAYOUT */
  #app-shell { display: flex; min-height: 100vh; }
  #sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); position: fixed; top: 0; left: 0; height: 100vh; display: flex; flex-direction: column; z-index: 100; transition: transform var(--transition); overflow-y: auto; }
  #sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-w))); }
  #main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; transition: margin-left var(--transition); }
  #main.expanded { margin-left: 0; }
  #topbar { height: var(--topbar-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 1.5rem; gap: 1rem; position: sticky; top: 0; z-index: 50; }
  #content { flex: 1; padding: 1.5rem; }
  /* SIDEBAR ELEMENTS */
  .sidebar-brand { padding: 1.25rem 1.25rem 1rem; border-bottom: 1px solid var(--border); }
  .brand-logo { display: flex; align-items: center; gap: .75rem; }
  .brand-icon { width: 36px; height: 36px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }
  .brand-name { font-size: 16px; font-weight: 700; color: var(--text); }
  .brand-sub { font-size: 10px; color: var(--text3); letter-spacing: .06em; text-transform: uppercase; }
  .nav-section { padding: .75rem 1rem .5rem; }
  .nav-label { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: .5rem; padding-left: .5rem; }
  .nav-item { display: flex; align-items: center; gap: .75rem; padding: .6rem .75rem; border-radius: var(--radius-sm); cursor: pointer; color: var(--text2); font-size: 13.5px; font-weight: 500; transition: all var(--transition); margin-bottom: 2px; position: relative; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--primary-light); color: var(--primary); }
  .nav-item .icon { width: 18px; text-align: center; font-size: 14px; }
  .nav-item .badge { margin-left: auto; background: var(--danger); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 99px; }
  .nav-item .badge.success { background: var(--success); }
  .sidebar-footer { margin-top: auto; border-top: 1px solid var(--border); padding: 1rem; }
  .user-mini { display: flex; align-items: center; gap: .75rem; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .avatar.sm { width: 28px; height: 28px; font-size: 11px; }
  .avatar.lg { width: 56px; height: 56px; font-size: 20px; }
  .avatar.xl { width: 80px; height: 80px; font-size: 28px; }
  /* TOPBAR */
  .topbar-toggle { background: none; border: none; color: var(--text2); font-size: 18px; cursor: pointer; padding: 6px; border-radius: var(--radius-sm); transition: background var(--transition); }
  .topbar-toggle:hover { background: var(--surface2); }
  .breadcrumb-bar { flex: 1; }
  .page-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .page-sub { font-size: 12px; color: var(--text3); }
  .topbar-actions { display: flex; align-items: center; gap: .5rem; margin-left: auto; }
  .icon-btn { width: 36px; height: 36px; border-radius: var(--radius-sm); background: none; border: 1px solid var(--border); color: var(--text2); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; transition: all var(--transition); position: relative; }
  .icon-btn:hover { background: var(--surface2); color: var(--text); }
  .notif-dot { position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; background: var(--danger); border-radius: 50%; border: 1.5px solid var(--surface); }
  /* CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
  .card-header-custom { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-header-custom h6 { font-size: 14px; font-weight: 600; color: var(--text); margin: 0; }
  .card-body-custom { padding: 1.25rem; }
  /* STAT CARDS */
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; position: relative; overflow: hidden; transition: transform var(--transition); }
  .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .stat-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: .75rem; }
  .stat-value { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-label { font-size: 12px; color: var(--text3); margin-top: 4px; font-weight: 500; }
  .stat-change { font-size: 11.5px; margin-top: .5rem; display: flex; align-items: center; gap: 4px; }
  .stat-change.up { color: var(--success); }
  .stat-change.down { color: var(--danger); }
  .stat-bar { height: 4px; border-radius: 99px; background: var(--border); margin-top: .75rem; overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 99px; transition: width 1s ease; }
  /* TABLE */
  .table-custom { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  .table-custom th { text-align: left; padding: .6rem 1rem; font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .06em; text-transform: uppercase; border-bottom: 1px solid var(--border); background: var(--surface2); }
  .table-custom td { padding: .75rem 1rem; border-bottom: 1px solid var(--border); color: var(--text2); vertical-align: middle; }
  .table-custom tr:last-child td { border-bottom: none; }
  .table-custom tr:hover td { background: var(--surface2); }
  /* BADGES */
  .badge-custom { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; }
  .badge-success { background: #d1fae5; color: #065f46; }
  .badge-danger { background: #fee2e2; color: #991b1b; }
  .badge-warning { background: #fef3c7; color: #92400e; }
  .badge-info { background: #e0f2fe; color: #075985; }
  .badge-primary { background: #eef2ff; color: #3730a3; }
  [data-theme="dark"] .badge-success { background: #064e3b; color: #6ee7b7; }
  [data-theme="dark"] .badge-danger { background: #7f1d1d; color: #fca5a5; }
  [data-theme="dark"] .badge-warning { background: #78350f; color: #fde68a; }
  [data-theme="dark"] .badge-info { background: #0c4a6e; color: #7dd3fc; }
  [data-theme="dark"] .badge-primary { background: #1e1b4b; color: #a5b4fc; }
  /* PROGRESS */
  .progress-custom { height: 8px; border-radius: 99px; background: var(--border); overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; transition: width 1s ease; }
  /* TOGGLE SWITCH */
  .toggle-switch { position: relative; width: 46px; height: 24px; cursor: pointer; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-track { position: absolute; inset: 0; background: var(--border); border-radius: 99px; transition: background var(--transition); }
  .toggle-thumb { position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: transform var(--transition); box-shadow: 0 1px 4px rgba(0,0,0,.2); }
  .toggle-switch input:checked ~ .toggle-track { background: var(--primary); }
  .toggle-switch input:checked ~ .toggle-thumb { transform: translateX(22px); }
  /* ATTENDANCE TOGGLE */
  .att-toggle { display: flex; border-radius: 99px; overflow: hidden; border: 1px solid var(--border); font-size: 12px; font-weight: 600; }
  .att-toggle span { padding: 4px 14px; cursor: pointer; transition: all var(--transition); }
  .att-present { background: var(--success); color: #fff; }
  .att-absent { background: var(--danger); color: #fff; }
  /* FORM */
  .form-control-custom { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: .5rem .75rem; font-size: 13.5px; width: 100%; transition: border var(--transition); outline: none; }
  .form-control-custom:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
  .form-label-custom { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: .04em; }
  /* BUTTONS */
  .btn-primary-custom { background: var(--primary); color: #fff; border: none; border-radius: var(--radius-sm); padding: .55rem 1.25rem; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: all var(--transition); display: inline-flex; align-items: center; gap: .5rem; }
  .btn-primary-custom:hover { background: var(--primary-dark); transform: translateY(-1px); }
  .btn-secondary-custom { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: .55rem 1.25rem; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: all var(--transition); display: inline-flex; align-items: center; gap: .5rem; }
  .btn-secondary-custom:hover { background: var(--border); }
  .btn-danger-custom { background: var(--danger); color: #fff; border: none; border-radius: var(--radius-sm); padding: .45rem 1rem; font-size: 12.5px; font-weight: 600; cursor: pointer; transition: all var(--transition); }
  .btn-danger-custom:hover { opacity: .85; }
  /* TOAST */
  #toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 9999; display: flex; flex-direction: column; gap: .5rem; }
  .toast-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: .75rem 1rem; font-size: 13px; display: flex; align-items: center; gap: .75rem; box-shadow: var(--shadow-md); min-width: 280px; animation: slideIn .3s ease; }
  .toast-item.success { border-left: 4px solid var(--success); }
  .toast-item.error { border-left: 4px solid var(--danger); }
  .toast-item.info { border-left: 4px solid var(--accent); }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  /* LOADER */
  .skeleton { background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-sm); }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .spinner { width: 20px; height: 20px; border: 2.5px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* CIRCULAR PROGRESS */
  .circ-progress { position: relative; display: inline-flex; align-items: center; justify-content: center; }
  .circ-progress svg { transform: rotate(-90deg); }
  .circ-center { position: absolute; text-align: center; }
  /* LOGIN */
  #login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: var(--shadow-md); }
  .role-tab { padding: .5rem 1rem; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-weight: 600; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); transition: all var(--transition); }
  .role-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  /* CALENDAR */
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-cell { aspect-ratio: 1; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; cursor: pointer; transition: all var(--transition); }
  .cal-cell:hover { background: var(--surface2); }
  .cal-cell.present { background: #d1fae5; color: #065f46; }
  .cal-cell.absent { background: #fee2e2; color: #991b1b; }
  .cal-cell.today { border: 2px solid var(--primary); }
  .cal-cell.empty { opacity: 0; cursor: default; }
  [data-theme="dark"] .cal-cell.present { background: #064e3b; color: #6ee7b7; }
  [data-theme="dark"] .cal-cell.absent { background: #7f1d1d; color: #fca5a5; }
  /* SEARCH */
  .search-box { position: relative; }
  .search-box input { padding-left: 2.2rem; }
  .search-icon { position: absolute; left: .7rem; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 13px; }
  /* SCHEDULE */
  .schedule-item { display: flex; gap: 1rem; padding: .75rem 0; border-bottom: 1px solid var(--border); }
  .schedule-item:last-child { border-bottom: none; }
  .schedule-time { font-size: 12px; color: var(--text3); font-weight: 600; white-space: nowrap; min-width: 70px; }
  .schedule-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
  .schedule-info h6 { font-size: 13px; font-weight: 600; color: var(--text); margin: 0 0 2px; }
  .schedule-info p { font-size: 12px; color: var(--text3); margin: 0; }
  /* NOTIF */
  .notif-item { padding: .75rem; border-radius: var(--radius-sm); background: var(--surface2); margin-bottom: .5rem; display: flex; gap: .75rem; cursor: pointer; transition: background var(--transition); }
  .notif-item:hover { background: var(--border); }
  .notif-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .notif-text { font-size: 12.5px; color: var(--text2); }
  .notif-time { font-size: 11px; color: var(--text3); margin-top: 2px; }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  /* Responsive */
  @media (max-width: 768px) {
    #sidebar { transform: translateX(calc(-1 * var(--sidebar-w))); }
    #sidebar.mobile-open { transform: translateX(0); }
    #main { margin-left: 0 !important; }
    #content { padding: 1rem; }
  }
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>

const h = React.createElement;

/* ─── DUMMY DATA ─── */
const STUDENTS = [

  { id: 6, name: 'Ananya Singh', roll: 'CS2106', class: 'CSE-B', email: 'ananya@edu.in', phone: '9876543215', photo: 'AN' },
  { id: 7, name: 'Vikram Rao', roll: 'CS2107', class: 'CSE-B', email: 'vikram@edu.in', phone: '9876543216', photo: 'VR' },
  { id: 8, name: 'Disha Kulkarni', roll: 'CS2108', class: 'CSE-B', email: 'disha@edu.in', phone: '9876543217', photo: 'DK' },

const SUBJECTS = [

  { id: 2, name: 'Operating Systems', code: 'CS302', credits: 3, teacher: 'Prof. Suresh Kumar' },

];

const USERS = {
  student: { name: 'Aarav Sharma', role: 'Student', email: 'aarav@edu.in', initials: 'AS', id: 1 },
  teacher: { name: 'Dr. Meena Roy', role: 'Teacher', email: 'meena@edu.in', initials: 'MR' },
  admin: { name: 'Admin User', role: 'Admin', email: 'admin@edu.in', initials: 'AU' },
};

/* ─── TOAST SYSTEM ─── */
let toastId = 0;
function showToast(msg, type = 'success') {
  const id = ++toastId;
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast-item ${type}`;
  el.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':type==='error'?'fa-times-circle':'fa-info-circle'}" style="color:${type==='success'?'#10b981':type==='error'?'#ef4444':'#06b6d4'}"></i><span style="color:var(--text)">${msg}</span>`;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(100%)'; el.style.transition = '.3s ease'; setTimeout(() => el.remove(), 300); }, 3000);
}

/* ─── CIRCULAR PROGRESS ─── */
function CircProgress({ pct, size=80, stroke=7, color='#4f46e5' }) {
  const r = (size - stroke * 2) / 2;
  const circ = 2 * Math.PI * r;
  const fill = circ - (pct / 100) * circ;
  return h('div', { className: 'circ-progress', style: { width: size, height: size } },
    h('svg', { width: size, height: size },
      h('circle', { cx: size/2, cy: size/2, r, fill: 'none', stroke: 'var(--border)', strokeWidth: stroke }),
      h('circle', { cx: size/2, cy: size/2, r, fill: 'none', stroke: color, strokeWidth: stroke, strokeDasharray: circ, strokeDashoffset: fill, strokeLinecap: 'round', style: { transition: 'stroke-dashoffset 1s ease' } })
    ),
    h('div', { className: 'circ-center' },
      h('div', { style: { fontSize: size > 70 ? 16 : 12, fontWeight: 700, color: 'var(--text)' } }, pct + '%'),
    )
  );
}

/* ─── STAT CARD ─── */
function StatCard({ icon, label, value, change, changeUp, barPct, barColor, iconBg }) {
  return h('div', { className: 'stat-card' },
    h('div', { className: 'stat-icon', style: { background: iconBg || '#eef2ff' } },
      h('i', { className: 'fas ' + icon, style: { color: barColor || '#4f46e5' } })
    ),

/* ─── SUBJECT DONUT ─── */
function SubjectDonut({ studentId }) {
  const canvasRef = useRef();
  const chartRef = useRef();
  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    const vals = SUBJECTS.map(s => {
      const att = ATTENDANCE_DATA[studentId]?.[s.id] || { attended: 0, total: 1 };
      return Math.round((att.attended / att.total) * 100);
    });
    chartRef.current = new Chart(canvasRef.current, {
      type: 'doughnut',
      data: {
        labels: SUBJECTS.map(s => s.name.split(' ')[0]),
        datasets: [{ data: vals, backgroundColor: COLORS, borderWidth: 0, hoverOffset: 8 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '70%',
        plugins: { legend: { display: false } }

    });
    return () => chartRef.current && chartRef.current.destroy();
  }, [studentId]);
  return h('div', { style: { position: 'relative', height: 160 } },
    h('canvas', { ref: canvasRef, 'aria-label': 'Subject-wise attendance donut chart', role: 'img' })
  );
}

function AdminPanel() {
  const [students, setStudents] = useState(STUDENTS);
  const [subjects, setSubjects] = useState(SUBJECTS);
  const [tab, setTab] = useState('students');
  const [search, setSearch] = useState('');
  const [newSt, setNewSt] = useState({ name: '', roll: '', class: 'CSE-A', email: '' });
  const [newSub, setNewSub] = useState({ name: '', code: '', credits: 3, teacher: '' });
  function addStudent() {
    if (!newSt.name || !newSt.roll) { showToast('Fill all required fields', 'error'); return; }
    const st = { ...newSt, id: Date.now(), photo: newSt.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2) };
    setStudents(p => [...p, st]);
    setNewSt({ name: '', roll: '', class: 'CSE-A', email: '' });
    showToast('Student added successfully!', 'success');
  }
  function removeStudent(id) { setStudents(p => p.filter(s => s.id !== id)); showToast('Student removed', 'info'); }
  function addSubject() {
    if (!newSub.name || !newSub.code) { showToast('Fill all required fields', 'error'); return; }
    setSubjects(p => [...p, { ...newSub, id: Date.now() }]);
    setNewSub({ name: '', code: '', credits: 3, teacher: '' });
    showToast('Subject added!', 'success');
  }
  const filteredSt = students.filter(s => s.name.toLowerCase().includes(search.toLowerCase()) || s.roll.includes(search));
  return h('div', null,
    h('div', { style: { marginBottom: '1.25rem' } },
      h('h5', { style: { fontWeight: 700, color: 'var(--text)', margin: 0 } }, 'Admin Panel'),
      h('p', { style: { fontSize: 13, color: 'var(--text3)', margin: 0 } }, 'Manage students, subjects, and assignments')
    ),
    h('div', { style: { display: 'flex', gap: 0, marginBottom: '1.25rem', borderBottom: '1px solid var(--border)' } },
      ['students', 'subjects'].map(t =>
        h('button', { key: t, onClick: () => setTab(t), style: { padding: '.6rem 1.25rem', background: 'none', border: 'none', borderBottom: tab === t ? '2px solid var(--primary)' : '2px solid transparent', color: tab === t ? 'var(--primary)' : 'var(--text2)', fontWeight: 600, fontSize: 13.5, cursor: 'pointer', transition: 'all .2s', marginBottom: -1 } },
          h('i', { className: 'fas ' + (t === 'students' ? 'fa-users' : 'fa-book'), style: { marginRight: 6 } }), t.charAt(0).toUpperCase() + t.slice(1)
        )
      )
    ),
    tab === 'students' ? h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 320px', gap: '1.25rem' } },
      h('div', { className: 'card' },
        h('div', { className: 'card-header-custom' },
          h('h6', null, 'Student List (' + filteredSt.length + ')'),
          h('div', { className: 'search-box', style: { width: 220 } },
            h('i', { className: 'fas fa-search search-icon' }),
            h('input', { className: 'form-control-custom', placeholder: 'Search...', value: search, onChange: e => setSearch(e.target.value), style: { paddingLeft: '2.2rem' } })
          )
        ),
        h('div', { style: { overflowX: 'auto' } },
          h('table', { className: 'table-custom' },
            h('thead', null,
              h('tr', null, h('th', null, 'Student'), h('th', null, 'Roll'), h('th', null, 'Class'), h('th', null, 'Email'), h('th', null, 'Action'))
            ),
            h('tbody', null,
              filteredSt.map((s, i) => h('tr', { key: s.id },
                h('td', null,
                  h('div', { style: { display: 'flex', alignItems: 'center', gap: 10 } },
                    h('div', { className: 'avatar sm', style: { background: COLORS[i % COLORS.length] } }, s.photo),
                    h('span', { style: { fontWeight: 600, color: 'var(--text)' } }, s.name)

                ),

                h('td', null, h('span', { className: 'badge-custom badge-info' }, s.class)),

              ))
            )
          )
        )
      ),
      h('div', { className: 'card' },
        h('div', { className: 'card-header-custom' }, h('h6', null, 'Add New Student')),
        h('div', { className: 'card-body-custom' },
          ['Name', 'Roll Number', 'Email'].map((f, i) =>
            h('div', { key: f, style: { marginBottom: '1rem' } },
              h('label', { className: 'form-label-custom' }, f + (i < 2 ? ' *' : '')),
              h('input', { className: 'form-control-custom', placeholder: 'Enter ' + f.toLowerCase(), value: Object.values(newSt)[i], onChange: e => setNewSt(p => ({ ...p, [Object.keys(p)[i]]: e.target.value })) })

          ),

    ) : h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 320px', gap: '1.25rem' } },
      h('div', { className: 'card' },
        h('div', { className: 'card-header-custom' }, h('h6', null, 'Subject List (' + subjects.length + ')')),
        h('table', { className: 'table-custom' },
          h('thead', null,
            h('tr', null, h('th', null, 'Subject'), h('th', null, 'Code'), h('th', null, 'Credits'), h('th', null, 'Teacher'))
          ),
          h('tbody', null,
            subjects.map((s, i) => h('tr', { key: s.id },
              h('td', null, h('span', { style: { fontWeight: 600, color: 'var(--text)' } }, s.name)),
              h('td', null, h('code', { style: { fontSize: 12, color: 'var(--text2)', background: 'var(--surface2)', padding: '2px 8px', borderRadius: 4 } }, s.code)),
              h('td', null, h('span', { className: 'badge-custom badge-primary' }, s.credits + ' cr')),
              h('td', null, s.teacher)
            ))
          )
        )
      ),
      h('div', { className: 'card' },
        h('div', { className: 'card-header-custom' }, h('h6', null, 'Add Subject')),
        h('div', { className: 'card-body-custom' },
          [['Subject Name', 'name'], ['Subject Code', 'code'], ['Teacher', 'teacher']].map(([lbl, key]) =>
            h('div', { key: key, style: { marginBottom: '1rem' } },
              h('label', { className: 'form-label-custom' }, lbl),
              h('input', { className: 'form-control-custom', placeholder: 'Enter ' + lbl.toLowerCase(), value: newSub[key], onChange: e => setNewSub(p => ({ ...p, [key]: e.target.value })) })
            )
          ),
          h('div', { style: { marginBottom: '1.25rem' } },
            h('label', { className: 'form-label-custom' }, 'Credits'),
            h('select', { className: 'form-control-custom', value: newSub.credits, onChange: e => setNewSub(p => ({ ...p, credits: Number(e.target.value) })) },

            )
          ),
          h('button', { className: 'btn-primary-custom', style: { width: '100%', justifyContent: 'center' }, onClick: addSubject },
            h('i', { className: 'fas fa-plus' }), ' Add Subject'
          )
        )
      )

        )

/* ─── APP ROOT ─── */
function App() {
  const [loggedIn, setLoggedIn] = useState(false);
  const [role, setRole] = useState('student');
  const [page, setPage] = useState('dashboard');
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [dark, setDark] = useState(false);
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  }, [dark]);
  function handleLogin(r) { setRole(r); setLoggedIn(true); setPage('dashboard'); showToast('Welcome! Logged in as ' + r, 'success'); }
  function handleLogout() { setLoggedIn(false); setPage('dashboard'); showToast('Logged out successfully', 'info'); }
  function renderPage() {
    switch(page) {
      case 'dashboard': return h(Dashboard, { role, userId: 1 });
      case 'mark': return h(MarkAttendance);
      case 'report': return h(AttendanceReport);
      case 'myAttendance': return h(StudentView, { studentId: 1 });
      case 'students': return h(StudentView, { studentId: 1 });
      case 'admin': return h(AdminPanel);
      case 'profile': return h(ProfilePage, { role });
      default: return h(Dashboard, { role, userId: 1 });
    }
  }
  if (!loggedIn) return h(LoginPage, { onLogin: handleLogin });
  return h('div', { id: 'app-shell' },
    h(Sidebar, { role, page, setPage, collapsed: sidebarCollapsed }),
    h('div', { id: 'main', className: sidebarCollapsed ? 'expanded' : '' },
      h(Topbar, { page, role, onToggleSidebar: () => setSidebarCollapsed(p => !p), onLogout: handleLogout, dark, onToggleDark: () => setDark(p => !p) }),
      h('div', { id: 'content' }, renderPage())
    )
  );
}

ReactDOM.render(h(App), document.getElementById('root'));
</script>
